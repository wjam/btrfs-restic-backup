name: ci.yml
on:
  push: {}

jobs:
  ci:
    runs-on: ubuntu-22.04
    env:
      FAKE_DEV: /dev/fake-dev0
      TEST_VOL: ${{ github.workspace }}/.vol
      TEST_SUBVOL: ${{ github.workspace }}/.vol/test
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: 'false'

      - name: Test
        run: |
          ls -la ${{ github.workspace }}

      - name: Create virtual block device
        run: .github/create_block_device.sh "$RUNNER_TEMP/dev0-backstore" "$FAKE_DEV"

      - name: Create BTRFS volume
        run: .github/create_btrfs_volume.sh "$FAKE_DEV" "$TEST_VOL" "$TEST_SUBVOL"

      - name: Add testdata to the subvolume
        run: |
          echo "hello, world" | sudo tee "$TEST_SUBVOL/file.txt"

      - name: Test
        run: |
          ls -la $TEST_VOL
          ls -la $TEST_SUBVOL
